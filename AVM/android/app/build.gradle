plugins {
    id "com.android.application"
    id "com.google.gms.google-services"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    buildFeatures {
        buildConfig = true
    }

    namespace = "com.craftech360.avm"

    flavorDimensions += "flavor-type"
    productFlavors {
        prod {
            dimension "flavor-type"
            applicationId "com.craftech360.avm"
            resValue "string", "app_name", "Altio"
        }
        dev {
            dimension "flavor-type"
            applicationId "com.craftech360.avm"
            resValue "string", "app_name", "Altio Dev"
        }
    }

    compileSdk = 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
    }

    defaultConfig {
        applicationId = "com.craftech360.avm"
        minSdk = 24
        targetSdk = 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
        buildConfigField("String", "INTERCOM_APP_ID", "\"${System.getenv("intercom.app.id")}\"")
        buildConfigField("String", "INTERCOM_ANDROID_API_KEY", "\"${System.getenv("intercom.android.api.key")}\"")
    }

    ndkVersion = "26.3.11579264"

    signingConfigs {
    release {
        if (keystorePropertiesFile.exists()) {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    debug {
        if (keystorePropertiesFile.exists()) {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
}


    buildTypes {
        release {
            productFlavors.dev.signingConfig signingConfigs.debug
            productFlavors.prod.signingConfig signingConfigs.release
            // fixing calendar
            // https://github.com/builttoroam/device_calendar/issues/99#issuecomment-612449677
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            minifyEnabled true
            shrinkResources true
        }
        debug{
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            minifyEnabled true
        }
    }

    ndkVersion System.getenv()["NDK_VERSION"] ?: "27.0.12077973"

    // buildTypes {
    //     release {
    //         signingConfig signingConfigs.release
    //         proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
    //     }
    //     debug {
            
    //     }
    // }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    // configurations.configureEach {
    //     resolutionStrategy {
    //         force 'androidx.appcompat:appcompat:1.6.1'
    //         force 'androidx.appcompat:appcompat-resources:1.6.1'
    //     }
    // }
}

flutter {
    source '../..'
}

dependencies {
    // implementation 'androidx.appcompat:appcompat:1.7.0'
    // implementation 'androidx.appcompat:appcompat-resources:1.7.0'
    // implementation 'androidx.multidex:multidex:2.0.1'
    // implementation 'com.google.android.gms:play-services-auth:20.7.0'
    // coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.3'
    // androidTestImplementation 'androidx.test:runner:1.6.2'
    // androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
    androidTestImplementation 'androidx.test:runner:1.2.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.0-alpha3'
    implementation 'io.intercom.android:intercom-sdk:latest.release'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'
}